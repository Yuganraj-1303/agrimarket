# Server configuration
# server.port=8080

server.port=${PORT}


# Database Configuration (PostgreSQL)
# spring.datasource.url=jdbc:postgresql://localhost:5432/agrimarket
# spring.datasource.username=postgres
# spring.datasource.password=root
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# JWT Configurations (Base64-encoded secret key or a plain long string)
agrimarket.app.jwtSecret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
agrimarket.app.jwtExpirationMs=86400000

# File Upload configurations
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
